services:
  db:
    image: postgres:15
    container_name: metro_db
    restart: always
    environment:
      POSTGRES_USER: metro_admin
      POSTGRES_PASSWORD: metro_passsword_1234
      POSTGRES_DB: metrosaathi
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data   

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: metro_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@metrosaathi.com
      PGADMIN_DEFAULT_PASSWORD: pgadmin123
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
